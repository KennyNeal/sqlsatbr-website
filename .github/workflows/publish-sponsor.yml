name: Publish Sponsor Listing

on:
  workflow_dispatch:
    inputs:
      event_slug:
        description: 'Event slug (e.g. dodbr-2026)'
        required: true
        type: string
      tier:
        description: 'Sponsor tier'
        required: true
        type: choice
        options:
          - global
          - platinum
          - facility
          - gold
          - silver
          - bronze
      sponsor_name:
        description: 'Sponsor name (as shown publicly on the site)'
        required: true
        type: string
      sponsor_url:
        description: 'Sponsor website URL (leave blank to omit)'
        required: false
        type: string
      logo_path:
        description: 'Logo path relative to static/ (e.g. sponsorlogos/acme.png — commit the file to static/sponsorlogos/ first)'
        required: false
        type: string
      logo_fit:
        description: 'Logo fit (standard is the default; use wide or extra-wide for very wide logos)'
        required: false
        type: choice
        options:
          - standard
          - wide
          - extra-wide
        default: standard

jobs:
  publish-sponsor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Add sponsor entry to sponsors.yaml
        env:
          EVENT_SLUG: ${{ inputs.event_slug }}
          TIER: ${{ inputs.tier }}
          SPONSOR_NAME: ${{ inputs.sponsor_name }}
          SPONSOR_URL: ${{ inputs.sponsor_url }}
          LOGO_PATH: ${{ inputs.logo_path }}
          LOGO_FIT: ${{ inputs.logo_fit }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          import yaml

          event_slug = os.environ['EVENT_SLUG'].strip()
          tier       = os.environ['TIER'].strip()
          name       = os.environ['SPONSOR_NAME'].strip()
          url        = os.environ.get('SPONSOR_URL', '').strip()
          logo       = os.environ.get('LOGO_PATH', '').strip()
          logo_fit   = os.environ.get('LOGO_FIT', 'standard').strip()

          yaml_path = f'content/events/{event_slug}/sponsors.yaml'

          if not os.path.exists(yaml_path):
              available = sorted(
                  d for d in os.listdir('content/events')
                  if os.path.isfile(f'content/events/{d}/sponsors.yaml')
              )
              hint = ', '.join(available) if available else '(none found)'
              print(f'ERROR: No sponsors.yaml found for event slug "{event_slug}".\n'
                    f'Available event slugs: {hint}\n'
                    f'Re-run the workflow with one of the slugs above.',
                    file=sys.stderr)
              sys.exit(1)

          with open(yaml_path) as fh:
              data = yaml.safe_load(fh)

          group = next((g for g in data.get('groups', []) if g.get('tier') == tier), None)
          if group is None:
              print(f'ERROR: tier "{tier}" not found in {yaml_path}. '
                    f'Available tiers: {[g.get("tier") for g in data.get("groups", [])]}',
                    file=sys.stderr)
              sys.exit(1)

          entry = {'name': name}
          if url:
              entry['url'] = url
          if logo:
              entry['logo'] = logo
          if logo_fit and logo_fit != 'standard':
              entry['logoFit'] = logo_fit

          group.setdefault('sponsors', []).append(entry)

          with open(yaml_path, 'w') as fh:
              yaml.dump(data, fh, default_flow_style=False, allow_unicode=True, sort_keys=False)

          print(f'Added "{name}" to {tier} tier in {yaml_path}')
          PYEOF

      - name: Create branch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_SLUG: ${{ inputs.event_slug }}
          TIER: ${{ inputs.tier }}
          SPONSOR_NAME: ${{ inputs.sponsor_name }}
        run: |
          # Derive a branch-safe slug from the sponsor name
          slug=$(echo "$SPONSOR_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-\|-$//g')
          ts=$(date +%Y%m%d%H%M%S)
          branch="sponsor/${EVENT_SLUG}-${slug}-${ts}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add "content/events/${EVENT_SLUG}/sponsors.yaml"
          git commit -m "Add ${SPONSOR_NAME} as ${TIER} sponsor for ${EVENT_SLUG}"
          git push origin "$branch"

          gh pr create \
            --title "Add ${SPONSOR_NAME} as ${TIER} sponsor (${EVENT_SLUG})" \
            --body "## Sponsor Listing Update

          | Field | Value |
          |-------|-------|
          | Event | \`${EVENT_SLUG}\` |
          | Tier | ${TIER} |
          | Sponsor | ${SPONSOR_NAME} |

          This PR was generated by the **Publish Sponsor Listing** workflow.

          **Review checklist before merging:**
          - [ ] Sponsor name and tier are correct
          - [ ] Logo file exists at the path specified (under \`static/sponsorlogos/\` for returning sponsors, or event-scoped if one-time)
          - [ ] Website URL is correct and publicly accessible
          - [ ] Sponsor has paid or payment is confirmed

          Merge to publish the sponsor on the live site." \
            --base main
