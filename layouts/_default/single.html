{{ define "main" }}
  <article class="card stack">
    <header class="stack stack-tight">
      <p class="eyebrow">Day of Data Baton Rouge</p>
      <h2>{{ .Title }}</h2>
      {{ with .Description }}<p class="lede">{{ . }}</p>{{ end }}
      {{ with .Params.dateLabel }}<p class="eyebrow">{{ . }}</p>{{ end }}
    </header>
    <div class="stack prose">
      {{ .Content }}
    </div>
  </article>
{{ end }}
