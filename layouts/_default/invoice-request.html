{{ define "main" }}
  <header class="page-header">
    <div class="page-header-inner">
      <h2>{{ .Title }}</h2>
      {{ with .Description }}<p class="page-header-lede">{{ . }}</p>{{ end }}
    </div>
  </header>
  <section class="section">
    <div class="section-inner narrow stack">
    <div class="stack prose">
      {{ .Content }}
    </div>
    {{ if not .Params.closed }}
    <form class="intake-form stack" method="post" action="{{ .Params.workerEndpoint }}">
      <input type="hidden" name="eventName" value="{{ .Parent.Title }}">
      <input type="hidden" name="eventSlug" value="{{ .Params.eventSlug }}">
      <div class="intake-grid">
        <label class="field stack-tight" for="organizationName">
          <span>Sponsor organization name</span>
          <input id="organizationName" name="organizationName" type="text" required>
        </label>
        <label class="field stack-tight" for="primaryContactName">
          <span>Primary contact name</span>
          <input id="primaryContactName" name="primaryContactName" type="text" required>
        </label>
        <label class="field stack-tight" for="contactEmail">
          <span>Contact email address</span>
          <input id="contactEmail" name="contactEmail" type="email" required>
        </label>
        <label class="field stack-tight" for="contactPhone">
          <span>Contact phone number</span>
          <input id="contactPhone" name="contactPhone" type="tel" required>
        </label>
        <label class="field stack-tight" for="sponsorPackage">
          <span>Requested Sponsor Package</span>
          <select id="sponsorPackage" name="sponsorPackage" required>
            <option value="">Select a package</option>
            <option>Blog</option>
            <option>Bronze</option>
            <option>Silver</option>
            <option>Gold</option>
            <option>Unattended Booth</option>
            <option>Platinum</option>
            <option>Other</option>
          </select>
        </label>
        <label class="field stack-tight" for="billingContactEmail">
          <span>Billing contact or accounts payable email</span>
          <input id="billingContactEmail" name="billingContactEmail" type="email" required>
        </label>
        <label class="field stack-tight" for="sponsorWebsite">
          <span>Your website (for the Sponsor Listing)</span>
          <input id="sponsorWebsite" name="sponsorWebsite" type="url" placeholder="https://example.com" required>
        </label>
        <label class="field stack-tight" for="logoUrl">
          <span>Link to your logo</span>
          <input id="logoUrl" name="logoUrl" type="url" placeholder="https://example.com/logo.png">
        </label>
        <label class="field stack-tight field-hidden" for="companyWebsite">
          <span>Company website</span>
          <input id="companyWebsite" name="companyWebsite" type="text" tabindex="-1" autocomplete="off">
        </label>
      </div>
      <label class="field stack-tight" for="notes">
        <span>Notes for organizers</span>
        <textarea id="notes" name="notes" rows="5" placeholder="Share billing notes, package questions, or Sponsor Listing details."></textarea>
      </label>
      <div class="stack stack-tight">
        <button class="button" type="submit">Submit &amp; get invoice</button>
        <p class="lede intake-status" data-intake-status hidden></p>
        <p class="button-row" data-intake-pay hidden>
          <a class="button" data-intake-pay-link href="#" target="_blank" rel="noopener">Pay your invoice now</a>
        </p>
      </div>
    </form>
    <script>
      (function () {
        var form = document.querySelector(".intake-form");
        var status = document.querySelector("[data-intake-status]");
        var payWrap = document.querySelector("[data-intake-pay]");
        var payLink = document.querySelector("[data-intake-pay-link]");

        if (!form || !status) {
          return;
        }

        form.addEventListener("submit", async function (event) {
          event.preventDefault();

          status.hidden = true;
          status.textContent = "";
          if (payWrap) {
            payWrap.hidden = true;
          }

          var submitter = form.querySelector("button[type='submit']");
          if (submitter) {
            submitter.disabled = true;
          }

          var formData = new FormData(form);
          var payload = {};

          formData.forEach(function (value, key) {
            payload[key] = value;
          });

          try {
            var response = await fetch(form.action, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
              },
              body: JSON.stringify(payload)
            });

            var body = await response.json();

            if (!response.ok || !body.ok) {
              throw new Error(body.message || "Invoice request submission failed.");
            }

            form.reset();
            status.textContent = body.message;
            status.classList.remove("intake-status-error");
            status.classList.add("intake-status-success");
            status.hidden = false;

            if (body.payUrl && payWrap && payLink) {
              payLink.href = body.payUrl;
              payWrap.hidden = false;
            }
          } catch (error) {
            status.textContent = error.message || "Invoice request submission failed.";
            status.classList.remove("intake-status-success");
            status.classList.add("intake-status-error");
            status.hidden = false;
          } finally {
            if (submitter) {
              submitter.disabled = false;
            }
          }
        });
      })();
    </script>
    {{ end }}
    </div>
  </section>
{{ end }}
