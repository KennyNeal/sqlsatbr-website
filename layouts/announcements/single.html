{{ define "main" }}
  {{ $event := .Parent.Parent }}
  <header class="page-header">
    <div class="page-header-inner">
      <p class="eyebrow eyebrow-light">{{ .Date.Format "January 2, 2006" }}</p>
      <h2>{{ .Title }}</h2>
    </div>
  </header>
  {{ partial "event-subnav.html" $event }}
  <section class="section">
    <div class="section-inner narrow stack">
      <div class="prose">{{ .Content }}</div>
      <p><a href="{{ .Parent.RelPermalink }}">&larr; All announcements</a></p>
    </div>
  </section>
{{ end }}
