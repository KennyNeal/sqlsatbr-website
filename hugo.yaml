baseURL: https://kennyneal.github.io/sqlsatbr-website/
locale: en-us
title: Day of Data Baton Rouge

params:
  tagline: A free, all-day event hosted by the Baton Rouge User Groups.
  # Default site theme. Any event can override logo/primaryColor/secondaryColor
  # in its own front matter; see docs/runbook.md.
  logo: eventlogos/DodBR2026.png
  primaryColor: "#013169"
  secondaryColor: "#e8a33d"

menu:
  main:
    # No "Home" entry: the site root renders the featured event, and the brand
    # logo in the banner is the link home.
    - name: Events
      pageRef: /events
      weight: 20
    - name: Become a Sponsor
      pageRef: /events/dodbr-2026/become-a-sponsor
      weight: 25
    - name: Past Events
      pageRef: /archive
      weight: 30

taxonomies: {}

markup:
  goldmark:
    renderer:
      unsafe: false
